[package]
name = "tiled_map_web_viewer"
version = "0.1.0"
edition = "2024"
authors = ["Bli_AIk"]
license = "GPL-3.0-or-later"
description = "A Tiled map viewer with WASM support for web deployment"

[dependencies]
bevy = "0.18"
bevy_workbench = "0.2"
bevy_ecs_tiled = "0.11"
egui = "0.33"

[[bin]]
name = "tiled_map_web_viewer"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
