name: Build and Upload Assets

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and Upload
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: tiled_map_web_viewer
            asset_name: tiled_map_web_viewer-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tiled_map_web_viewer.exe
            asset_name: tiled_map_web_viewer-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            arm_target: aarch64-apple-darwin
            artifact_name: tiled_map_web_viewer
            asset_name: tiled_map_web_viewer-macos-universal

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libx11-dev \
            libxi-dev \
            libxinerama-dev \
            libxcursor-dev \
            libgl1-mesa-dev \
            pkg-config \
            mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install additional targets (macOS Universal)
        if: matrix.os == 'macos-latest'
        run: rustup target add ${{ matrix.arm_target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release (Linux/Windows)
        if: matrix.os != 'macos-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build Universal Binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cargo build --release --target ${{ matrix.target }}
          cargo build --release --target ${{ matrix.arm_target }}
          lipo -create \
               target/${{ matrix.target }}/release/${{ matrix.artifact_name }} \
               target/${{ matrix.arm_target }}/release/${{ matrix.artifact_name }} \
               -output target/release/${{ matrix.asset_name }}

      - name: Strip binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Package binary
        shell: bash
        run: |
          mkdir staging
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            cp target/release/${{ matrix.asset_name }} staging/tiled_map_web_viewer
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} staging/
          else
            cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} staging/
          fi
          cd staging
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            7z a ../${{ matrix.asset_name }}.zip *
          else
            zip -r ../${{ matrix.asset_name }}.zip *
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.asset_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
