[advisories]
# `paste` is unmaintained but is a transitive dependency from wgpu/metal.
# We cannot control this and there is no security risk.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "BlueOak-1.0.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "GPL-3.0-or-later",
    "bzip2-1.0.6",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
